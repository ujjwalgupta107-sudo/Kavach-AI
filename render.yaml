databases:
  # PostgreSQL Database
  - name: kavach-db
    plan: free

services:
  # FastAPI Backend
  - type: web
    name: kavach-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kavach-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGINS
        value: '["*"]' # Allows any frontend. For strict security, you should update this to the frontend URL later.

  # React + Vite Frontend
  - type: web
    name: kavach-frontend
    env: static
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: kavach-backend
          property: hostport
